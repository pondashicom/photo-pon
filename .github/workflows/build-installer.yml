name: Build Windows Installer

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-windows-installer:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: npm

            - name: Show versions
              run: |
                  node -v
                  npm -v

            - name: Install dependencies
              run: npm ci

            - name: Build and publish Windows installer
              run: npm run dist -- --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: List dist files
              if: always()
              run: |
                  if (Test-Path dist) {
                      Get-ChildItem -Recurse dist
                  } else {
                      Write-Host "dist folder not found"
                  }
              shell: pwsh

            - name: Upload installer artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: PHOTO-PON-windows-installer
                  path: |
                      dist/*.exe
                      dist/*.blockmap
                  if-no-files-found: warn
                  retention-days: 14